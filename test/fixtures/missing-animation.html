<!doctype html>
<html>
  <head>
    <title>Animation fixture</title>
    <style>
      @keyframes slide {
        from {
          transform: translateX(0);
          opacity: 0;
        }
        to {
          transform: translateX(200px);
          opacity: 1;
        }
      }
      .hero {
        animation: slide 3s ease-out forwards;
        background: #f00;
        width: 100px;
        height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="hero"></div>
  </body>
</html>
