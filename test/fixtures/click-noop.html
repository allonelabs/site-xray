<!doctype html>
<html>
  <head>
    <title>Click fixture</title>
  </head>
  <body>
    <button id="cta">Click me</button>
    <div id="result"></div>
    <script>
      document.getElementById("cta").addEventListener("click", () => {
        const result = document.getElementById("result");
        result.textContent = "Clicked!";
        // Generate ≥10 mutations so the probe's noise threshold is satisfied
        for (let i = 0; i < 12; i++) {
          const d = document.createElement("div");
          d.className = "burst-" + i;
          d.textContent = "x" + i;
          result.appendChild(d);
        }
      });
    </script>
  </body>
</html>
